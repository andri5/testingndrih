services:
  postgres:
    image: postgres:16-alpine
    container_name: testingndrih-db
    environment:
      POSTGRES_USER: ${DB_USER:-testuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-testpass123}
      POSTGRES_DB: ${DB_NAME:-testingndrih}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-testuser} -d ${DB_NAME:-testingndrih}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    networks:
      - testingndrih-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: testingndrih-backend
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${DB_USER:-testuser}:${DB_PASSWORD:-testpass123}@postgres:5432/${DB_NAME:-testingndrih}
      PORT: 5001
    ports:
      - "5001:5001"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma
    networks:
      - testingndrih-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: testingndrih-frontend
    environment:
      VITE_API_URL: http://backend:5001
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
    networks:
      - testingndrih-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  testingndrih-network:
    driver: bridge
