# ============================================================================
# TestingNDRIH Multi-Laptop Docker Compose Configuration
# ============================================================================
# This setup works for:
# 1. Single laptop: all in Docker
# 2. Multi-laptop: Laptop 1 (DB + App), Laptop 2 (connects to Laptop 1 DB)
#
# For Laptop 2 connection:
# - Edit .env and change DATABASE_URL to point to Laptop 1 IP:
#   DATABASE_URL=postgresql://user:pass@LAPTOP_1_IP:5432/testingndrih
# - Or export environment variable before docker-compose up
# ============================================================================

services:
  # PostgreSQL Database — shared across both laptops if needed
  postgres:
    image: postgres:16-alpine
    container_name: testingndrih-db
    environment:
      POSTGRES_USER: ${DB_USER:-testingndrih_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-testpass123}
      POSTGRES_DB: ${DB_NAME:-testingndrih}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-testingndrih_user} -d ${DB_NAME:-testingndrih}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    networks:
      - testingndrih-network
    # For multi-laptop: make sure port 5432 is accessible from other laptops
    # Set in firewall rules if needed

  # Combined Frontend + Backend in Single Container
  # - Frontend: React SPA served at / (port 3000)
  # - Backend: Express API at /api/* (port 3000)
  # This simplifies deployment and CORS configuration
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: testingndrih-app
    environment:
      # Node environment
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3000}
      
      # Database connection
      # For Docker internal: postgresql://user:pass@postgres:5432/db (postgres = service name)
      # For Laptop 2: postgresql://user:pass@LAPTOP_1_IP:5432/db
      DATABASE_URL: ${DATABASE_URL:-postgresql://testingndrih_user:testpass123@postgres:5432/testingndrih}
      
      # Security
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-long-random-secret}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      
      # CORS - allow requests from frontend on same host
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      
      # Seed user credentials
      SEED_EMAIL: ${SEED_EMAIL:-admin@testingndrih.local}
      SEED_PASSWORD: ${SEED_PASSWORD:-changeme123}
      
      # Scheduler
      ENABLE_SCHEDULER: ${ENABLE_SCHEDULER:-true}
      
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - testingndrih-network
    # For debugging:
    # stdin_open: true
    # tty: true

volumes:
  postgres_data:
    driver: local

networks:
  testingndrih-network:
    driver: bridge

