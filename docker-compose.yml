version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: test_execution_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: test_execution_app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - test_execution_network

volumes:
  postgres_data:

networks:
  test_execution_network:
    driver: bridge
