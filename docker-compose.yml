services:
  postgres:
    image: postgres:16-alpine
    container_name: testingndrih-db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    networks:
      - testingndrih-network

  # Combined frontend + backend in a single container.
  # Frontend is built at image-build time; Express serves both the React SPA
  # (at /) and the REST API (at /api/*) on the same port.
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: testingndrih-app
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3000
      CORS_ORIGIN: http://localhost:3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - testingndrih-network

volumes:
  postgres_data:
    driver: local

networks:
  testingndrih-network:
    driver: bridge

