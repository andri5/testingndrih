<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test Sambil Ngopi — Maintenance</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Inter, system-ui, -apple-system, sans-serif;
      background: #0F0E11;
      color: #E0E0E2;
      padding: 1.5rem;
    }
    .card { max-width: 28rem; text-align: center; }
    .icon {
      width: 4rem; height: 4rem; margin: 0 auto 1.5rem;
      border-radius: 1rem; background: #161618;
      border: 1px solid #2A2A2D;
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem;
    }
    h1 { font-size: 1.25rem; font-weight: 600; margin-bottom: 0.5rem; }
    p { font-size: 0.875rem; color: #8B8B8E; line-height: 1.6; margin-bottom: 1.5rem; }
    .badge {
      display: inline-flex; align-items: center; gap: 0.5rem;
      padding: 0.375rem 0.75rem; border-radius: 9999px;
      background: #161618; border: 1px solid #2A2A2D;
      font-size: 0.75rem; color: #8B8B8E; margin-bottom: 1.5rem;
    }
    .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #facc15; animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    button {
      width: 100%; padding: 0.625rem 1rem; border: none; border-radius: 0.5rem;
      background: #5E6AD2; color: #fff; font-size: 0.875rem; font-weight: 500;
      cursor: pointer; transition: background 0.15s;
    }
    button:hover { background: #4F5BBF; }
    .foot { font-size: 0.6875rem; color: #555; margin-top: 1.5rem; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">☕</div>
    <h1>Under Maintenance</h1>
    <p>
      Test Sambil Ngopi is temporarily unavailable while we perform maintenance.
      Please check back soon — your data is safe.
    </p>
    <div class="badge"><span class="dot"></span> Maintenance in progress</div>
    <button type="button" onclick="location.reload()">Try again</button>
    <p class="foot">Auto-refresh recommended in a few minutes.</p>
  </div>
  <script>
    setInterval(function () {
      fetch('/health', { cache: 'no-store' })
        .then(function (r) { return r.json(); })
        .then(function (d) { if (d.status === 'ok') location.href = '/'; })
        .catch(function () {});
    }, 15000);
  </script>
</body>
</html>
