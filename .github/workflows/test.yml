name: Unit Tests CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  unit-tests:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
      
      - name: Install Backend Dependencies
        working-directory: ./backend
        run: npm install
      
      - name: Run Unit Tests
        working-directory: ./backend
        env:
          NODE_ENV: test
        run: npm test -- --coverage --coveragePathIgnorePatterns=/node_modules/ --collectCoverageFrom='src/**/*.{js,jsx}' || true
      
      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./backend/coverage/coverage-final.json
          flags: unittests
          name: backend-coverage
          fail_ci_if_error: false
      
      - name: Archive Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: backend/coverage/
          retention-days: 30
  
  quality-gate:
    name: Quality Gate Check
    runs-on: ubuntu-latest
    needs: [unit-tests]
    if: always()
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: test-artifacts
      
      - name: Quality Gate Report
        run: |
          echo "## Quality Gate Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Unit Tests" >> $GITHUB_STEP_SUMMARY
          if [ -d test-artifacts/unit-test-results ]; then
            echo "✅ Unit tests coverage generated" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Unit test coverage not available" >> $GITHUB_STEP_SUMMARY
          fi

  notify:
    name: Notify Results
    runs-on: ubuntu-latest
    needs: [quality-gate]
    if: always()
    
    steps:
      - name: Determine Status
        id: status
        run: |
          if [ "${{ needs.quality-gate.result }}" = "success" ]; then
            echo "status=✅ CI Pipeline Passed" >> $GITHUB_OUTPUT
            echo "color=green" >> $GITHUB_OUTPUT
          else
            echo "status=⚠️ CI Pipeline Check Completed" >> $GITHUB_OUTPUT
            echo "color=orange" >> $GITHUB_OUTPUT
          fi
      
      - name: Post Status to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Test Results Summary\n\n**${{ steps.status.outputs.status }}**\n\n- ✅ Unit Tests: ${{ needs.unit-tests.result }}`
            })
