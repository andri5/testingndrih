name: E2E Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  e2e:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Setup Database
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/testdb
        run: npx prisma migrate deploy

      - name: Start Backend
        working-directory: ./backend
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/testdb
          JWT_SECRET: ci-test-secret-key-minimum-32-chars-long
          PORT: 5001
        run: node src/server.js &

      - name: Wait for Backend
        run: |
          for i in $(seq 1 30); do
            curl -f http://localhost:5001/api/auth/login -X POST -H "Content-Type: application/json" -d '{"email":"x","password":"x"}' 2>/dev/null && break
            echo "Waiting for backend... ($i/30)"
            sleep 2
          done

      - name: Build Frontend
        working-directory: ./frontend
        run: npm run build

      - name: Start Frontend (Preview)
        working-directory: ./frontend
        run: npx vite preview --port 3000 &

      - name: Wait for Frontend
        run: |
          for i in $(seq 1 15); do
            curl -f http://localhost:3000 2>/dev/null && break
            echo "Waiting for frontend... ($i/15)"
            sleep 2
          done

      - name: Install Playwright Browsers
        working-directory: ./frontend
        run: npx playwright install chromium --with-deps

      - name: Run E2E Tests
        working-directory: ./frontend
        env:
          CI: true
        run: npx playwright test --project=chromium

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
