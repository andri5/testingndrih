name: Production Monitor

# Live production checks — separate from branch CI so feature work is not blocked when prod is down.
on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

env:
  HUSKY: 0
  PROD_URL: https://testsambilngopi.com

jobs:
  pre-check:
    name: Production reachability
    runs-on: ubuntu-latest
    steps:
      - name: Probe health API
        run: |
          for attempt in 1 2 3; do
            if curl -fsS --connect-timeout 15 "${PROD_URL}/health"; then
              echo ""
              echo "Production health OK"
              exit 0
            fi
            echo "Attempt ${attempt}: health check failed, retrying..."
            sleep 10
          done
          echo "::error::Production unreachable — skipping browser smoke."
          exit 1

  production-smoke:
    name: Production Smoke
    needs: pre-check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
        working-directory: .
      - run: npx playwright install chromium --with-deps
      - run: npx playwright test e2e/production-smoke-e2e.spec.js --project=chromium
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: https://testsambilngopi.com
