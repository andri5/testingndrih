name: Frontend Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    name: Build & Bundle
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v5
      
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '18.x'
      
      - name: Install Dependencies
        working-directory: ./frontend
        run: npm install
      
      - name: Build
        working-directory: ./frontend
        run: npm run build
      
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v5
        with:
          name: frontend-build
          path: frontend/dist/
          retention-days: 7
