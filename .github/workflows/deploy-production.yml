name: Deploy Production

# Triggered by Release workflow (gh workflow run) or manual dispatch.
# Runs on self-hosted runner on the VPS — see scripts/setup-github-runner.sh
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (empty = latest GitHub release)'
        required: false
      use_main:
        description: 'Deploy latest main instead of a release tag'
        type: boolean
        default: false
      force_no_cache:
        description: 'Docker build without layer cache (slower, use if stale image)'
        type: boolean
        default: false
      notify_telegram:
        description: 'Send Telegram notification on success/failure'
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to testsambilngopi.com
    runs-on: [self-hosted, production]
    environment: production
    outputs:
      deployed: ${{ steps.complete.outputs.deployed }}
      tag: ${{ steps.tag.outputs.tag }}

    steps:
      - name: Resolve deploy target
        id: tag
        run: |
          if [ "${{ github.event.inputs.use_main }}" = "true" ]; then
            echo "tag=main" >> "$GITHUB_OUTPUT"
            echo "Target: latest main branch"
            exit 0
          fi
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG=$(curl -fsSL \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/releases/latest" \
              | jq -r .tag_name)
          fi
          if [ -z "$TAG" ] || [ "$TAG" = "null" ]; then
            echo "No published release found"
            exit 1
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Target release tag: ${TAG}"

      - name: Validate deploy path
        env:
          PROD_APP_PATH: ${{ secrets.PROD_APP_PATH }}
        run: |
          if [ -z "${PROD_APP_PATH}" ]; then
            echo "Missing secret PROD_APP_PATH"
            exit 1
          fi
          if [ ! -d "${PROD_APP_PATH}" ]; then
            echo "Deploy path does not exist: ${PROD_APP_PATH}"
            exit 1
          fi
          echo "Deploy path OK: ${PROD_APP_PATH}"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.tag }}
          fetch-depth: 1

      - name: Deploy application
        id: deploy_check
        env:
          APP_PATH: ${{ secrets.PROD_APP_PATH }}
          FORCE_NO_CACHE: ${{ github.event.inputs.force_no_cache }}
        run: bash scripts/deploy-production.sh

      - name: Mark deploy complete
        id: complete
        run: echo "deployed=true" >> "$GITHUB_OUTPUT"

  notify-telegram-success:
    name: Telegram — deploy success
    needs: deploy
    runs-on: ubuntu-latest
    if: >-
      success() &&
      needs.deploy.outputs.deployed == 'true' &&
      github.event.inputs.notify_telegram == 'true'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Notify deploy success
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEPLOY_TAG: ${{ needs.deploy.outputs.tag }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
        run: bash scripts/telegram-deploy-notify.sh success

  notify-telegram-failure:
    name: Telegram — deploy failed
    needs: deploy
    runs-on: ubuntu-latest
    if: >-
      failure() &&
      github.event.inputs.notify_telegram == 'true'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Notify deploy failure
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEPLOY_TAG: ${{ needs.deploy.outputs.tag }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
        run: bash scripts/telegram-deploy-notify.sh failure
