name: CI

# Pipeline: push main → CI → Release → Deploy Production
on:
  push:
    branches: [main, 'feat/**', 'fix/**', 'hotfix/**']
  pull_request:
    branches: [main]

env:
  HUSKY: 0

jobs:
  commitlint:
    name: Commit lint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: wagoid/commitlint-github-action@v6

  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
        working-directory: .
      - run: npm test
      - run: npm run lint
        continue-on-error: true

  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
        working-directory: .
      - run: npm run lint
        continue-on-error: true

  frontend-e2e:
    name: Platform E2E
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
        working-directory: .
      # package-lock generated on Windows omits Linux Rollup native bindings (npm/cli#4828)
      - name: Install Rollup native binding for Linux
        working-directory: .
        run: |
          ROLLUP_VERSION=$(node -p "require('./frontend/node_modules/rollup/package.json').version")
          npm install --no-save "@rollup/rollup-linux-x64-gnu@${ROLLUP_VERSION}"
      - run: npx playwright install chromium --with-deps
      - run: npm run build
      # Build from source — validates the commit before deploy (prod may lag behind main)
      - run: npx playwright test e2e/platform-features-e2e.spec.js --project=chromium
        env:
          CI: true

  # Production smoke lives in prod-monitor.yml (scheduled) — not gated on CI
  # so prod issues or deploy lag do not block releases.
