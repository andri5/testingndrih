name: Build & Deployment Ready

on:
  push:
    branches: [ main ]
  release:
    types: [created]

jobs:
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          cache: 'npm'
      
      - name: Install Dependencies
        working-directory: ./backend
        run: npm install --production
      
      - name: Build Backend
        working-directory: ./backend
        run: |
          if [ -f Dockerfile ]; then
            docker build -t testingndri-backend:latest .
            echo "Backend Docker image built successfully"
          else
            echo "Backend is ready for deployment (Node.js app)"
          fi
      
      - name: Output Build Info
        run: |
          echo "## Backend Build Status" >> $GITHUB_STEP_SUMMARY
          echo "✅ Dependencies: Installed" >> $GITHUB_STEP_SUMMARY
          echo "✅ Ready for: Deployment" >> $GITHUB_STEP_SUMMARY
  
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          cache: 'npm'
      
      - name: Install Dependencies
        working-directory: ./frontend
        run: npm install
      
      - name: Build Frontend
        working-directory: ./frontend
        run: npm run build
      
      - name: Archive Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/
          retention-days: 30
      
      - name: Output Build Info
        run: |
          echo "## Frontend Build Status" >> $GITHUB_STEP_SUMMARY
          echo "✅ Build: Successful" >> $GITHUB_STEP_SUMMARY
          echo "✅ Output: dist/" >> $GITHUB_STEP_SUMMARY
          echo "✅ Ready for: Deployment" >> $GITHUB_STEP_SUMMARY
  
  docker-build:
    name: Docker Image Build
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    if: github.event_name == 'release'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Build and Push Backend Image
        run: |
          if [ -f backend/Dockerfile ]; then
            docker build -t testingndri-backend:${GITHUB_SHA::8} ./backend
            echo "✅ Backend image built: testingndri-backend:${GITHUB_SHA::8}"
          fi
      
      - name: Build and Push Frontend Image
        run: |
          if [ -f frontend/Dockerfile ]; then
            docker build -t testingndri-frontend:${GITHUB_SHA::8} ./frontend
            echo "✅ Frontend image built: testingndri-frontend:${GITHUB_SHA::8}"
          fi
