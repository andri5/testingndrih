<!DOCTYPE html>
<html>
<head>
    <title>API Test</title>
    <style>
        body { font-family: monospace; margin: 20px; }
        textarea { width: 100%; height: 300px; }
        button { padding: 10px 20px; }
    </style>
</head>
<body>
    <h1>API Test - Auth Endpoints</h1>
    <button onclick="testLogin()">Test POST /api/auth/login</button>
    <button onclick="testRegister()">Test POST /api/auth/register</button>
    <h3>Response:</h3>
    <textarea id="response" readonly></textarea>
    
    <script>
        async function testLogin() {
            try {
                const resp = await fetch('http://localhost:5001/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: 'admin@testingndrih.local',
                        password: 'AdminPass123!'
                    })
                });
                
                const text = await resp.text();
                document.getElementById('response').value = 
                    'LOGIN: Status ' + resp.status + '\n' +
                    'Content-Type: ' + resp.headers.get('content-type') + '\n' +
                    '\n' + text;
            } catch (err) {
                document.getElementById('response').value = 'Error: ' + err.message;
            }
        }
        
        async function testRegister() {
            try {
                const resp = await fetch('http://localhost:5001/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: 'admin@testingndrih.local',
                        password: 'AdminPass123!',
                        name: 'Admin User'
                    })
                });
                
                const text = await resp.text();
                document.getElementById('response').value = 
                    'REGISTER: Status ' + resp.status + '\n' +
                    'Content-Type: ' + resp.headers.get('content-type') + '\n' +
                    '\n' + text;
            } catch (err) {
                document.getElementById('response').value = 'Error: ' + err.message;
            }
        }
    </script>
</body>
</html>
